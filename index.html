<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>마음세탁소 🫧</title>
    <link rel="icon" href="https://fav.farm/🫧">

    <style>
        /* [CSS 영역] 인테리어와 애니메이션 담당 */
        body {
            background-color: #f0f7ff;
            color: #334455;
            font-family: 'Pretendard', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .laundry-card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
            position: relative; /* 박스 기준점 설정 */
        }

        .tab-menu {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: #eef2f6;
            padding: 5px;
            border-radius: 15px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 10px;
            transition: 0.3s;
            color: #8899aa;
            flex: 1; /* 버튼 너비를 동일하게 분할 */
        }

        .tab-btn.active {
            background: white;
            color: #2575fc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-weight: bold;
        }

        .content-section { 
            display: none; 
            min-height: 350px; /* 높이를 조금 넉넉히 주어 겹침 방지 */
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* 위쪽부터 차례대로 배치 */
        }

        .content-section.active { 
            display: flex; 
            animation: fadeIn 0.5s ease-in; 
        }

        /* 1. [세탁 섹션] 애니메이션 */
        #worryInput {
            width: 100%;
            height: 120px;
            border: 1px solid #e0e6ed;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            transition: 2s; /* 서서히 사라지게 하는 시간 */
        }

        /* 2. [호흡 섹션] 커졌다 작아지는 원 */
        .breath-container {
            height: 220px; /* 원이 커질 충분한 공간을 미리 확보 */
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        .breath-circle {
            width: 100px; /* 기본 크기를 조금 줄임 */
            height: 100px;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            border-radius: 50%;
            /* breathe 애니메이션: 8초 동안 무한 반복 */
            animation: breathe 8s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(161, 196, 253, 0.4);
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); } /* 처음과 끝: 기본 */
            50% { transform: scale(1.8); } /* 중간: 1.8배까지 커짐 (이때 위아래 간격 중요) */
        }

        /* [공통 가구 디자인] */
        select, button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e0e6ed;
            margin: 10px 0;
            font-size: 16px;
            outline: none;
        }

        button.main-btn {
            background: #2575fc;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button.main-btn:hover { background: #1a5dbb; }

        #prescriptionResult {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            font-size: 15px;
            line-height: 1.6;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="laundry-card">
        <h1>마음세탁소 🫧</h1>
        
        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('wash')">고민 세탁</button>
            <button class="tab-btn" onclick="openTab('breathe')">호흡 건조</button>
            <button class="tab-btn" onclick="openTab('prescription')">마음 처방</button>
        </div>

        <div id="wash" class="content-section active">
            <p>버리고 싶은 마음을 적어주세요.</p>
            <textarea id="worryInput" placeholder="여기에 고민을 쓰면 세탁되어 사라집니다..."></textarea>
            <button class="main-btn" onclick="startWashing()">세탁 시작 🫧</button>
        </div>

        <div id="breathe" class="content-section">
            <p style="margin-bottom: 5px;">원의 리듬에 맞춰 숨을 쉬어보세요.</p>
            <div class="breath-container">
                <div class="breath-circle"></div>
            </div>
            <p id="breathText" style="color: #2575fc; font-weight: bold; font-size: 18px;">들숨... (4초)</p>
        </div>

        <div id="prescription" class="content-section">
            <p>오늘 당신의 마음 상태는 어떤가요?</p>
            <select id="moodSelect">
                <option value="불안">불안해요</option>
                <option value="분노">화가 나요</option>
                <option value="지침">너무 지쳤어요</option>
                <option value="허무">공허해요</option>
            </select>
            <button class="main-btn" onclick="getPrescription()">처방전 받기 ✨</button>
            <div id="prescriptionResult">처방전이 이곳에 나타납니다.</div>
        </div>
    </div>

    <script>
        /* [JS 영역] 자바스크립트 로직 */

        // 탭 전환 시스템
        function openTab(tabName) {
            const sections = document.getElementsByClassName('content-section');
            const btns = document.getElementsByClassName('tab-btn');
            
            for (let s of sections) s.classList.remove('active');
            for (let b of btns) b.classList.remove('active');

            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');

            if (tabName === 'breathe') {
                startBreathGuide();
            } else {
                stopBreathGuide(); // 다른 탭으로 가면 타이머 정지
            }
        }

        // 고민 세탁 (지우개 효과)
        function startWashing() {
            const input = document.getElementById('worryInput');
            if (input.value.trim() === "") return alert("세탁할 고민을 적어주세요!");
            
            input.style.opacity = "0"; // 2초 동안 서서히 투명하게
            setTimeout(() => {
                input.value = "";
                input.style.opacity = "1";
                alert("고민이 깨끗하게 세탁되었습니다! 🫧");
            }, 2000);
        }

        // 호흡 가이드 타이머
        let breathInterval = null;
        function startBreathGuide() {
            const text = document.getElementById('breathText');
            if (breathInterval) clearInterval(breathInterval);
            
            text.innerText = "들숨... (4초)";
            breathInterval = setInterval(() => {
                text.innerText = text.innerText === "들숨... (4초)" ? "날숨... (4초)" : "들숨... (4초)";
            }, 4000);
        }

        function stopBreathGuide() {
            if (breathInterval) {
                clearInterval(breathInterval);
                breathInterval = null;
            }
        }

        // 마음 처방 로직
        function getPrescription() {
            const mood = document.getElementById('moodSelect').value;
            const resDiv = document.getElementById('prescriptionResult');
            
            const advice = {
                "불안": "불안은 미래에 가 있는 마음입니다. 지금 발바닥의 감각에 집중해 보세요. 발가락을 꼼지락거려 볼까요?",
                "분노": "화는 뜨거운 숯불을 상대에게 던지기 위해 쥐고 있는 것과 같습니다. 먼저 당신의 소중한 손부터 보호하세요.",
                "지침": "아무것도 하지 않는 것은 게으름이 아니라 '회복'입니다. 오늘 10분만 멍하게 있어보는 건 어떨까요?",
                "허무": "공허함은 새로운 것을 채울 수 있는 빈 그릇이 생겼다는 뜻입니다. 아주 작은 기쁨 하나만 담아보세요."
            };

            resDiv.innerText = advice[mood];
            resDiv.style.animation = 'none';
            resDiv.offsetHeight; 
            resDiv.style.animation = 'fadeIn 0.8s ease-in';
        }

        // 오늘 날짜 표시
        window.onload = function() {
            // 사이트 로딩 시 초기화가 필요한 경우 여기에 작성
        };
    </script>
</body>
</html>
