<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음세탁소 🫧</title>
    <link rel="icon" href="https://fav.farm/🫧">
    <style>
        body {
            background-color: #f0f7ff;
            color: #334455;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .laundry-card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            text-align: center;
        }
        .tab-menu {
            display: flex;
            margin-bottom: 30px;
            background: #eef2f6;
            padding: 5px;
            border-radius: 15px;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 12px;
            cursor: pointer;
            flex: 1;
            color: #8899aa;
            border-radius: 10px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: white;
            color: #2575fc;
            font-weight: bold;
        }
        .content-section { display: none; min-height: 350px; flex-direction: column; align-items: center; }
        .content-section.active { display: flex; }
        
        .breath-container {
            height: 250px; 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .breath-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            border-radius: 50%;
            animation: breathe 8s infinite ease-in-out;
            box-shadow: 0 0 20px rgba(161, 196, 253, 0.3);
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(2.2); }
        }
        textarea, select, button.main-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e0e6ed; margin: 10px 0; font-size: 16px; outline: none;
        }
        button.main-btn { background: #2575fc; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.main-btn:hover { background: #1a5dbb; }
        #prescriptionResult { margin-top:20px; background:#f8f9fa; padding:15px; border-radius:12px; font-size: 15px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="laundry-card">
        <h1>마음세탁소 🫧</h1>
        <div class="tab-menu">
            <button class="tab-btn active" onclick="openTab('wash')">고민 세탁</button>
            <button class="tab-btn" onclick="openTab('breathe')">호흡 건조</button>
            <button class="tab-btn" onclick="openTab('prescription')">마음 처방</button>
        </div>
        
        <div id="wash" class="content-section active">
            <p>버리고 싶은 마음을 적어주세요.</p>
            <textarea id="worryInput" style="height:100px; transition:2s;" placeholder="여기에 고민을 쓰면 세탁됩니다..."></textarea>
            <button class="main-btn" onclick="startWashing()">세탁 시작 🫧</button>
        </div>

        <div id="breathe" class="content-section">
            <p>원의 리듬에 맞춰 숨을 쉬어보세요.</p>
            <div class="breath-container"><div class="breath-circle"></div></div>
            <p id="breathText" style="color:#2575fc; font-weight:bold; font-size:24px;">준비중...</p>
        </div>

        <div id="prescription" class="content-section">
            <p>오늘 마음 상태를 골라주세요.</p>
            <select id="moodSelect">
                <option value="불안">불안해요</option>
                <option value="분노">화가 나요</option>
                <option value="지침">너무 지쳤어요</option>
                <option value="허무">공허해요</option>
            </select>
            <button class="main-btn" onclick="getPrescription()">처방전 받기 ✨</button>
            <div id="prescriptionResult"></div>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            const sections = document.getElementsByClassName('content-section');
            const btns = document.getElementsByClassName('tab-btn');
            for (let s of sections) s.classList.remove('active');
            for (let b of btns) b.classList.remove('active');
            document.getElementById(tabName).classList.add('active');
            event.currentTarget.classList.add('active');
            if (tabName === 'breathe') startBreathGuide();
            else stopBreathGuide();
        }

        function startWashing() {
            const input =
